name: Wake EC2 + trigger CI

on:
  # pull_request_target fires only when a maintainer adds the label (below).
  # Using the label as the gate means CI never runs for unapproved/first-time
  # contributors, and the required "ci/pipeline-score" status is simply never
  # posted until then — so the PR stays unmergeable until a maintainer approves.
  pull_request_target:
    types: [labeled]
  push:
    branches: [main]

jobs:
  wake-and-build:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'approved-for-ci')
    runs-on: ubuntu-latest
    steps:
      - name: Start EC2 and trigger Jenkins via SSM
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1
          # L40S CI box (avatar-graperoot-l40s, g6e.8xlarge).
          INSTANCE_ID:           i-0a7c6c7bb9dee006b
          # Injected via env (not inline ${{ }}) to avoid script injection.
          PR_NUMBER:             ${{ github.event.number }}
          PR_SHA:                ${{ github.event.pull_request.head.sha }}
        run: |
          pip install awscli -q
          STATE=$(aws ec2 describe-instances --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" --output text)
          echo "Instance state: $STATE"
          if [ "$STATE" = "stopped" ]; then
            aws ec2 start-instances --region "$AWS_REGION" --instance-ids "$INSTANCE_ID"
          fi
          aws ec2 wait instance-running --region "$AWS_REGION" --instance-ids "$INSTANCE_ID"

          # Jenkins port 8080 is NOT publicly exposed — the security group only
          # allows the maintainer's IP. So we trigger the build over AWS SSM
          # (authenticated by these AWS creds) instead of POSTing to the public
          # port. ci_trigger.sh on the box talks to Jenkins over localhost.
          echo "Waiting for the SSM agent to come online..."
          for i in $(seq 1 40); do
            PING=$(aws ssm describe-instance-information --region "$AWS_REGION" \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" --output text 2>/dev/null || true)
            [ "$PING" = "Online" ] && { echo "SSM agent online"; break; }
            sleep 10
          done

          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            CMD="bash /home/ubuntu/ci_trigger.sh '$PR_NUMBER' '$PR_SHA' ''"
            echo "Triggering CI for PR #$PR_NUMBER ($PR_SHA)"
          else
            CMD="bash /home/ubuntu/ci_trigger.sh '' '' 'main'"
            echo "Triggering baseline build on main"
          fi

          CMD_ID=$(aws ssm send-command --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "higgsfree CI trigger" \
            --parameters "commands=[\"$CMD\"]" \
            --query "Command.CommandId" --output text)
          echo "Dispatched SSM command $CMD_ID"
