name: Wake EC2 for Jenkins

on:
  pull_request_target:
    types: [labeled]

jobs:
  wake-ec2:
    if: github.event.label.name == 'approved-for-ci'
    runs-on: ubuntu-latest
    steps:
      - name: Start EC2 instance
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1
          INSTANCE_ID:           i-0a7c6c7bb9dee006b
        run: |
          pip install awscli -q
          STATE=$(aws ec2 describe-instances --region $AWS_REGION \
            --instance-ids $INSTANCE_ID \
            --query "Reservations[0].Instances[0].State.Name" --output text)
          echo "Instance state: $STATE"
          if [ "$STATE" = "stopped" ]; then
            aws ec2 start-instances --region $AWS_REGION --instance-ids $INSTANCE_ID
            echo "Waiting for instance to be running..."
            aws ec2 wait instance-running --region $AWS_REGION --instance-ids $INSTANCE_ID
            echo "EC2 is running"
          else
            echo "Instance already $STATE"
          fi

      - name: Wait for Jenkins to be ready
        run: |
          echo "Waiting for Jenkins on port 8080..."
          for i in $(seq 1 24); do
            if curl -s --max-time 5 http://44.197.172.237:8080/login | grep -q "Jenkins"; then
              echo "Jenkins is up"
              break
            fi
            echo "Attempt $i/24 — not ready yet, waiting 10s..."
            sleep 10
          done

      - name: Trigger Jenkins scan
        env:
          JENKINS_USER:  ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
        run: |
          # Trigger a branch scan on the Multibranch Pipeline job
          curl -s -X POST \
            --user "$JENKINS_USER:$JENKINS_TOKEN" \
            "http://44.197.172.237:8080/job/higgsfree/build" \
            -w "\nHTTP status: %{http_code}\n"
